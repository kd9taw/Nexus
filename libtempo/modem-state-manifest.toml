# libtempo modem state manifest — PARTIAL / NOT YET AUTHORITATIVE
#
# WHAT THIS IS: every module-scope (implicitly SAVEd) data symbol in the vendored WSJT-X +
# FT1 Fortran. Two radio chains decoding different bands in ONE process share all of it, so
# each symbol must be classified:
#   class 1 = PER-CHAIN   carries chain-specific data between calls; MUST be swapped
#   class 2 = INIT-ONCE   written once then read-only; shareable
#   class 3 = SCRATCH     fully overwritten before read each call; shareable IF that holds
#   class 4 = CONSTANT    never written; shareable
#
# STATUS 2026-07-21: the AUDIT phase completed and is trustworthy — all 425 symbols across
# 6 groups are catalogued below. The CHALLENGE phase (which adversarially re-tests every
# "shareable" claim) DIED on a session limit after 103 of 291 challenges. Therefore:
#
#   * class-1 entries below are the audit's own finding and are the safe default.
#   * class 2/3/4 entries are CLAIMS THAT ARE LARGELY UNVERIFIED. 198 were never challenged.
#   * Of the 103 challenges that did run, 32 REFUTED the shareable claim — a 31% refutation
#     rate. That rate is the reason this file must not be trusted as-is: applied to the 198
#     unchallenged claims it implies roughly 60 more symbols belong in class 1.
#   * Challenge results could NOT be reliably attributed back to symbols, because 87 symbol
#     names collide across files (`first` x23, `twopi` x11, `dt` x6), covering 295 of 425
#     symbols. Re-running must key on file:line, not name.
#
# DO NOT build the per-chain context from this file yet. Re-run the challenge phase BATCHED
# (15-30 symbols per agent, ~12 agents — see feedback-cap-agent-fanout), keyed by file:line.
#
# ⚠️ A DEMONSTRATED MISCLASSIFICATION — proof the class-3 bucket cannot be trusted:
# the audit filed `slots` (ir_harq_combine, the FT1 IR-HARQ buffer) as class 3 "scratch".
# That is definitively WRONG. IR-HARQ exists to COMBINE redundancy versions ACROSS
# transmissions, so it persists between calls by definition — it is the textbook class 1.
# The independent multi-radio design cites the contamination mechanism concretely: slots are
# matched on audio frequency ALONE (abs(slots(i)%freq - freq) <= FREQ_TOL_HZ = 10 Hz,
# ir_harq_combine.f90:42,61,266-282) across a 2400 Hz passband, so two bands collide
# constantly and the joint turbo decode runs on incoherent symbols — yielding PLAUSIBLE
# WRONG FT1 MESSAGES rather than a clean failure. This entry is corrected to class 1 below.
# It is corrected by hand; the rest of class 3 is NOT, and this is exactly why it must be
# re-challenged before anyone builds from this file.
#
# NOTE a discrepancy to resolve: this audit totals class-1 at ~60 KB, but the independent
# multi-radio design measured a7 (36,340 B) + IR-HARQ (2,134,004 B) = 2,170,344 B. Either
# the audit missed the IR-HARQ slot array or sized it differently. Resolve before relying
# on either number — the per-chain memcpy cost argument rests on it.

# ===== class 1 — 63 symbols, ~60910 bytes =====
